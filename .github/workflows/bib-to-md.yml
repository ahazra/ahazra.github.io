name: Generate markdown from BibTeX

on:
  push:
    branches: ["master"]
    paths:
      - "markdown_generator/Journ_pub.bib"
      - "markdown_generator/MyPub.bib"
      - "markdown_generator/Talks.bib"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install pybtex

      - name: Generate publications markdown
        working-directory: markdown_generator
        run: python pubsFromBib.py

      - name: Generate talks markdown
        working-directory: markdown_generator
        run: python talksFromBib.py

      - name: Commit generated files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add _publications/ _talks/
          git diff --cached --quiet || git commit -m "Auto-generate markdown from BibTeX"
          git push
