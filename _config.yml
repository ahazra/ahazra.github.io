# -----------------------------
# Theme
# -----------------------------
remote_theme: "mmistakes/minimal-mistakes"
minimal_mistakes_skin: "dark"

# -----------------------------
# Site Settings
# -----------------------------
locale: "en-US"
title: "Arijit Hazra"
title_separator: "-"
name: "Arijit Hazra"
description: "Computational and data-driven methods for thermo-fluid engineering"
url: "https://ahazra.github.io"
baseurl: ""
repository: "ahazra/ahazra.github.io"
breadcrumbs: false
words_per_minute: 160
future: false
read_more: "enabled"
talkmap_link: false
timezone: India

# -----------------------------
# Author
# -----------------------------
author:
  name: "Arijit Hazra"
  avatar: "profile.jpg"
  bio: "Ramanujan Faculty Fellow<br>Department of Mechanical Engineering<br>IIT Palakkad"
  location: "Palakkad, India"
  employer: "IIT Palakkad"
  googlescholar: "https://scholar.google.com/citations?user=EJ8Ya1EAAAAJ&hl=en"
  email: "mailtohazra@gmail.com"
  github: "ahazra"
  twitter: "ahazra4"
  orcid: "https://orcid.org/0000-0002-0940-9705"

# -----------------------------
# Reading Files
# -----------------------------
include:
  - _pages

exclude:
  - "*.sublime-project"
  - "*.sublime-workspace"
  - node_modules
  - vendor
  - tmp
  - log

encoding: "utf-8"
markdown_ext: "markdown,mkdown,mkdn,mkd,md"

# -----------------------------
# Markdown
# -----------------------------
markdown: kramdown
highlighter: rouge

kramdown:
  input: GFM
  hard_wrap: false
  auto_ids: true
  toc_levels: 1..6

# -----------------------------
# Collections
# -----------------------------
collections:
  publications:
    output: true
    permalink: /publications/:path/
  talks:
    output: true
    permalink: /talks/:path/

# -----------------------------
# Defaults
# -----------------------------
defaults:
  - scope:
      path: ""
      type: pages
    values:
      layout: single
      author_profile: true

  - scope:
      path: ""
      type: publications
    values:
      layout: single
      author_profile: false

  - scope:
      path: ""
      type: talks
    values:
      layout: single
      author_profile: false

  - scope:
      path: ""
      type: posts
    values:
      layout: single
      author_profile: true
      permalink: /blog/:year/:slug/

# -----------------------------
# Sass
# -----------------------------
sass:
  sass_dir: _sass
  style: compressed

# -----------------------------
# Plugins (SINGLE BLOCK)
# -----------------------------
plugins:
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-gist
  - jekyll-feed
  - jekyll-redirect-from

# -----------------------------
# Archives
# -----------------------------
category_archive:
  type: liquid
  path: /categories/

tag_archive:
  type: liquid
  path: /tags/

# -----------------------------
# HTML Compression
# -----------------------------
compress_html:
  clippings: all
  ignore:
    envs: development
